<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>discussion-tree</title>
    <!-- Favicon: the same leaf that marks a bookmarked ("shiori") message,
         tinted a soft green. Inlined as a data URI so the Bun HTML bundler
         leaves it alone (it only rewrites relative local asset paths). -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjNGFkZTgwIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHBhdGggZD0iTTExIDIwQTcgNyAwIDAgMSA5LjggNi4xQzE1LjUgNSAxNyA0LjQ4IDE5IDJjMSAyIDIgNC4xOCAyIDggMCA1LjUtNC43OCAxMC0xMCAxMFoiLz48cGF0aCBkPSJNMiAyMWMwLTMgMS44NS01LjM2IDUuMDgtNkM5LjUgMTQuNTIgMTIgMTMgMTMgMTIiLz48L3N2Zz4K"
    />
    <!-- React Flow's NodeResizer (ResizeObserver-driven) emits the benign
         "ResizeObserver loop completed with undelivered notifications" warning
         during a node resize: the browser self-corrects on the next frame and
         nothing is actually broken. But Bun's dev HMR overlay catches that
         window 'error' and throws up a scary full-screen "Runtime Error"
         (shown as "error: null", since there is no Error object). Swallow ONLY
         this exact benign message in the capture phase — registered here in
         <head> so it runs before the HMR runtime's own error handler. Real
         errors are untouched. -->
    <script>
      (function () {
        var BENIGN =
          /ResizeObserver loop (completed with undelivered notifications|limit exceeded)/;
        window.addEventListener(
          "error",
          function (e) {
            if (e && e.message && BENIGN.test(e.message)) {
              e.stopImmediatePropagation();
              e.preventDefault();
            }
          },
          true,
        );
      })();
    </script>
    <!-- Launch as a standalone web app when added to the iOS/Android home
         screen, so tapping the icon reuses the single app window instead of
         spawning a new Safari tab each time. (iOS only reads these at
         "Add to Home Screen" time — an existing icon must be re-added.) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="discussion-tree" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#a855f7" />
    <!-- The manifest <link> is injected at runtime (see frontend.tsx) because
         the Bun HTML bundler tries to resolve a build-time href; the manifest
         is served dynamically by the broker at /manifest.webmanifest. -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./frontend.tsx"></script>
  </body>
</html>
